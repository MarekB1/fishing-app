{% extends "base.html" %}
{% block title %}Reset hesla{% endblock %}

{% block content %}
  <h1>Reset hesla</h1>
  <p>Zadaj email a pošleme ti odkaz na nastavenie nového hesla.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Poslať odkaz</button>
  </form>

  <p style="margin-top: 1rem;">
    <a href="{% url 'login' %}">Späť na prihlásenie</a>
  </p>
{% endblock %}
