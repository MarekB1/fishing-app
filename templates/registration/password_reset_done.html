{% extends "base.html" %}
{% block title %}Email odoslaný{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h3 fw-bold mb-2">Email odoslaný</h1>
          <p class="mb-0 text-secondary">
            Ak účet s týmto emailom existuje, poslali sme odkaz na reset hesla.
            Skontroluj aj spam.
          </p>
        </div>
      </div>

      <div class="mt-3">
        <a class="btn btn-outline-light" href="{% url 'login' %}">Späť na prihlásenie</a>
      </div>
    </div>
  </div>
{% endblock %}
