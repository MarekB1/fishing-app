{% extends "base.html" %}
{% block title %}Nastaviť nové heslo{% endblock %}

{% block content %}
  <h1>Nastaviť nové heslo</h1>

  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Uložiť nové heslo</button>
    </form>
  {% else %}
    <p>Odkaz je neplatný alebo expirovaný. Skús reset hesla znovu.</p>
    <a href="{% url 'password_reset' %}">Resetovať heslo</a>
  {% endif %}
{% endblock %}
