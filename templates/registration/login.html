{% extends "base.html" %}
{% block title %}Prihlásenie{% endblock %}

{% block content %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

  <p style="margin-top: 1rem;">
    <a href="{% url 'password_reset' %}">Zabudol som heslo</a>
  </p>
{% endblock %}
