{% if pending_catches %}
  <table>
    <thead>
      <tr>
        <th>Čas</th><th>Súťaž</th><th>Súťažiaci</th><th>Druh</th><th>Foto</th>
      </tr>
    </thead>
    <tbody>
      {% for c in pending_catches %}
        <tr>
          <td>{{ c.created_at|date:"d.m.Y H:i" }}</td>
          <td><a href="{% url 'competitions:detail' c.competition.id %}">{{ c.competition.name }}</a></td>
          <td>{{ c.user.username }}</td>
          <td>{{ c.species }}</td>
          <td>
            {% if c.photo %}<a href="{{ c.photo.url }}" target="_blank" rel="noopener">zobraziť</a>{% else %}—{% endif %}
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% else %}
  <article><strong>Žiadne pending úlovky.</strong></article>
{% endif %}
