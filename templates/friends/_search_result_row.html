<div class="d-flex justify-content-between align-items-center alert alert-info mb-0 py-2" id="search-user-{{ u.id }}">
  <div class="me-3">
    <div class="fw-semibold">{% firstof u.get_full_name u.username %}</div>
    <div class="text-secondary small">@{{ u.username }}</div>
  </div>

  <div class="d-flex flex-wrap gap-2">
    {% if state == "friend" %}
      <button type="button" class="btn btn-success btn-sm" disabled>Priateľ</button>

    {% elif state == "outgoing" %}
      <button type="button" class="btn btn-outline-light btn-sm" disabled>Čaká…</button>

    {% elif state == "incoming" %}
      <form
        method="post"
        action="{% url 'friends:send_request' u.id %}"
        hx-post="{% url 'friends:send_request' u.id %}"
        hx-target="#search-user-{{ u.id }}"
        hx-swap="outerHTML"
      >
        {% csrf_token %}
        <button type="submit" class="btn btn-success btn-sm">Prijať</button>
      </form>

    {% else %}
      <form
        method="post"
        action="{% url 'friends:send_request' u.id %}"
        hx-post="{% url 'friends:send_request' u.id %}"
        hx-target="#search-user-{{ u.id }}"
        hx-swap="outerHTML"
      >
        {% csrf_token %}
        <button type="submit" class="btn btn-primary btn-sm">Pridať</button>
      </form>
    {% endif %}
  </div>
</div>
