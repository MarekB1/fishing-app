{% if catches %}
  <div class="table-responsive">
    <table class="table table-dark table-hover mb-0 align-middle">
      <thead>
        <tr>
          <th>Druh</th>
          <th>Čas</th>
          <th>Súťažiaci</th>
          <th class="text-end">Detail</th>
        </tr>
      </thead>
      <tbody>
        {% for c in catches %}
          <tr>
            <td class="fw-semibold">{{ c.species }}</td>
            <td class="text-secondary">{{ c.caught_at|date:"d.m.Y H:i" }}</td>
            <td>{{ c.user.username }}</td>
            <td class="text-end">
              <a class="btn btn-outline-light btn-sm" href="{% url 'catches:detail' c.id %}?next={{ back_url|urlencode }}">Otvoriť</a>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% else %}
  <div class="p-3">
    <div class="alert alert-info mb-0">
      <span class="fw-semibold">Zatiaľ žiadne úlovky.</span>
    </div>
  </div>
{% endif %}
